<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>即時地震監測系統 - 登入</title>
<style>
  body {
    margin: 0;
    font-family: "Noto Sans TC", sans-serif;
    background-color: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .login-container {
    background-color: #ffffff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.1);
    width: 360px;
    text-align: center;
  }

  .login-container img.logo {
    max-width: 120px;
    margin-bottom: 20px;
  }

  .login-container h1 {
    font-size: 22px;
    margin-bottom: 30px;
    color: #002b88;
  }

  .login-container label {
    display: block;
    text-align: left;
    font-size: 14px;
    margin-bottom: 5px;
    color: #333;
  }

  /* 統一所有輸入框樣式 */
  input {
    width: 100%;
    padding: 10px 12px;
    margin-bottom: 20px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
    box-sizing: border-box;
  }

  /* 統一所有主要按鈕樣式 (深藍色) */
  button {
    width: 100%;
    padding: 10px;
    background-color: #002b88;
    color: white;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  button:hover {
    background-color: #0039b0;
  }

  /* 統一所有次要按鈕樣式 (灰色) */
  .btn-secondary {
    background-color: #ccc !important;
    color: #333 !important;
    margin-top: 10px;
  }

  .btn-secondary:hover {
    background-color: #bbb !important;
  }

  .info {
    margin-top: 20px;
    font-size: 12px;
    color: #555;
    line-height: 1.5;
  }

  /* --- 彈窗樣式 --- */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  .modal-content {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
  }

  .modal-content h2 {
    font-size: 18px;
    color: #002b88;
    margin-bottom: 15px;
  }

  .modal-content p {
    font-size: 14px;
    color: #666;
    margin-bottom: 20px;
  }

  .forgot-link {
    margin-top: 15px;
    font-size: 13px;
  }

  .forgot-link a {
    color: #002b88;
    text-decoration: none;
  }

  .forgot-link a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

  <div class="login-container">
    <img class="logo" src="DPS_logo.jpg" alt="公司Logo">
    <h1>即時地震監測系統</h1>

    <label for="username">帳號 / Username</label>
    <input type="text" id="username" placeholder="請輸入帳號">

    <label for="password">密碼 / Password</label>
    <input type="password" id="password" placeholder="請輸入密碼">

    <button id="loginBtn">登入</button>

    <div class="forgot-link">
      <a href="#" id="forgotPwdLink">忘記密碼？ / Forgot Password?</a>
    </div>

    <div class="info">
      公司：中保防災科技股份有限公司<br>
      客服電話：02-7746-9919
    </div>
  </div>

  <div id="forgotOverlay" class="overlay">
    <div class="modal-content">
      <h2>找回密碼</h2>
      <p>請輸入您的帳號或 Email，系統將發送重設郵件至您的信箱：</p>
      <input type="text" id="forgotInput" placeholder="Username / Email">
      <button id="sendForgotBtn">發送重設郵件</button>
      <button id="closeForgotBtn" class="btn-secondary">取消</button>
    </div>
  </div>

  <div id="emailOverlay" class="overlay">
    <div class="modal-content">
      <h2 style="color: #d32f2f;">安全資訊補全</h2>
      <p>為了保障您的帳號安全及密碼找回功能，請輸入您的電子信箱：</p>
      <input type="email" id="firstTimeEmail" placeholder="example@mail.com">
      <button id="submitEmailBtn">提交並進入系統</button>
    </div>
  </div>

  <script>
    const API_BASE = 'http://127.0.0.1:5001/api';
    let tempUser = null;

    // 登入邏輯
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return alert('請輸入帳號與密碼');

      try {
        const response = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();
        if (response.ok) {
          tempUser = result.user;
          if (tempUser.needsEmail) {
            document.getElementById('emailOverlay').style.display = 'flex';
          } else {
            successLogin(tempUser);
          }
        } else {
          alert('登入失敗：' + (result.error || '未知錯誤'));
        }
      } catch (error) {
        alert('連線伺服器失敗');
      }
    });

    // 忘記密碼彈窗控制
    const forgotOverlay = document.getElementById('forgotOverlay');
    document.getElementById('forgotPwdLink').addEventListener('click', (e) => {
      e.preventDefault();
      forgotOverlay.style.display = 'flex';
    });

    document.getElementById('closeForgotBtn').addEventListener('click', () => {
      forgotOverlay.style.display = 'none';
    });

    // 發送忘記密碼郵件
    document.getElementById('sendForgotBtn').addEventListener('click', async () => {
      const account = document.getElementById('forgotInput').value.trim();
      if (!account) return alert('請輸入帳號或 Email');

      const btn = document.getElementById('sendForgotBtn');
      btn.disabled = true;
      btn.innerText = '發送中...';

      try {
        const response = await fetch(`${API_BASE}/forgot_password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account })
        });
        const result = await response.json();
        if (response.ok) {
          alert(result.message);
          forgotOverlay.style.display = 'none';
        } else {
          alert('失敗：' + result.error);
        }
      } catch (e) {
        alert('連線失敗');
      } finally {
        btn.disabled = false;
        btn.innerText = '發送重設郵件';
      }
    });

    // 補填 Email 邏輯
    document.getElementById('submitEmailBtn').addEventListener('click', async () => {
      const emailInput = document.getElementById('firstTimeEmail').value.trim();
      if (!emailInput || !emailInput.includes('@')) return alert('請輸入有效的 Email');

      try {
        const response = await fetch(`${API_BASE}/update_user_email`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: tempUser.username, email: emailInput })
        });
        if (response.ok) {
          tempUser.email = emailInput;
          alert('Email 設定成功！');
          successLogin(tempUser);
        } else {
          const res = await response.json();
          alert('設定失敗：' + res.error);
        }
      } catch (error) {
        alert('提交失敗');
      }
    });

    function successLogin(user) {
      sessionStorage.setItem('userData', JSON.stringify(user));
      alert('登入成功！歡迎 ' + user.name);
      window.location.href = "index.html"; 
    }
  </script>
</body>

</html>
