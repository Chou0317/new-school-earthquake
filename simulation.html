<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>地震模擬</title>
    <style>
        :root{
            --bg:#6c6c6c;
            --card:#ffffff;
            --primary:#002b88;
            --primary-light:#3b82f6;
            --danger:#ef4444;
            --muted:#6b7280;
            --shadow:0 6px 18px rgba(15,23,42,0.08);
            --radius:12px;
            font-family:-apple-system, BlinkMacSystemFont,'Segoe UI', Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;
        }
        html,body{ height:100%; margin:0; background:var(--bg); overflow: hidden; }
        body{ padding:24px; display:flex; justify-content:center; }

        /* 卡片佈局 */
        .card{ width:100%; max-width:1300px; background:var(--card); border-radius:0; box-shadow:var(--shadow); display:flex; flex-direction:column; height:92vh; margin-top:10px; }

        /* Header */
        .header{ flex-shrink:0; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 20px; background:var(--primary); color:white; }
        .title{ font-size:20px; font-weight:600; }

        /* 搜尋區 */
        .search-row {
            flex-shrink:0;
            display: flex;
            align-items: center;
            gap:12px;
            padding:12px 20px;
            background:#f9fafb;
            border-radius:8px;
            margin:0 16px 12px 16px;
            flex-wrap:nowrap;
        }
        .search-row .form-group{ display:flex; align-items:center; gap:6px; flex: 0 0 auto; }
        .search-row label{ font-size:14px; font-weight:500; color:var(--muted); white-space:nowrap; line-height:32px; }
        .search-row input[type="text"], .search-row select{ height:28px; padding:2px 6px; border-radius:6px; border:1px solid #ccc; font-size:13px; background:#fff;}
        .btn-search{ height:32px; padding:0 14px; border-radius:6px; background:var(--primary-light); color:#fff; border:none; cursor:pointer; font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:center; }

        /* 分頁按鈕樣式 */
        .pagination { display:flex; gap:4px; flex-wrap:wrap; }
        .pagination span { cursor:pointer; padding:3px 5px; color:var(--primary); font-weight:600; font-size:12px; }
        .pagination span.current { font-weight:700; text-decoration:underline; cursor:default; color:#111; }
        .pagination span.disabled { color:#999; cursor:default; }
        .pagination-container { display:flex; justify-content:center; padding:12px 0; border-top:1px solid #eee; background:#fff; }

        /* 列表容器 */
        .list-wrapper { flex:1; overflow-y:auto; position:relative; }
        .list{ width:100%; border-top:1px solid #eee; border-bottom:1px solid #eee; }

        /* 標題固定 (Sticky) */
        .list-head { 
            position: sticky; top:0; z-index:10; background:#f9fafb;
            display: flex; align-items: center; gap:12px; padding:12px 8px; color:var(--muted); font-weight:700;
        }
        .list-row { display: flex; align-items: center; gap:12px; padding:12px 8px; border-bottom: 1px solid #f2f2f2; }

        /* 列表欄位分配 */
        .list-head div, .list-row div { flex: 1 1 0; min-width:80px; text-align: center; }
        .col-1 { flex: 0 0 60px !important; }    
        .col-6 { min-width:150px; }  

        /* 模擬按鈕與選單 */
        .sim-btn{ padding:4px 10px; border-radius:6px; background:var(--primary-light); color:#fff; border:none; cursor:pointer; font-size:13px; font-weight:600; margin-left:4px; }
        .sim-select { height:26px; border-radius:4px; border:1px solid #ccc; font-size: 13px; }
        .empty{ padding:48px; text-align:center; color:var(--muted); font-weight: 500; }

        /* TOP 按鈕 */
        #topBtn{ position:fixed; right:20px; bottom:20px; width:44px; height:44px; background:var(--primary-light); color:white; border:none; border-radius:8px; display:none; align-items:center; justify-content:center; cursor:pointer; z-index:200; }

        /* 🔴 自定義確認 Modal 樣式 (參考自主機設定) */
        .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:500; }
        .confirm-card { width: 380px; padding: 24px; background: #fff; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #1f2937; }
        .confirm-desc { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
        .confirm-btns { display: flex; gap: 12px; justify-content: center; }
        .btn-confirm { background: var(--primary-light); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-close { background: #fff; border: 1px solid #ccc; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; color: #374151; }

        @media (max-width:720px){
            .search-row{ flex-wrap: wrap; }
            .list-head div, .list-row div{ min-width:60px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="header">
        <div class="title">地震模擬</div>
    </div>

    <div class="search-row">
        <div class="form-group">
            <label>ID</label>
            <input type="text" id="idInput" placeholder="輸入主機ID">
        </div>
        <div class="form-group">
            <label>縣市</label>
            <select id="countySelect"></select>
        </div>
        <div class="form-group">
            <label>鄉鎮</label>
            <select id="townSelect"><option value="-">-</option></select>
        </div>
        <div class="form-group">
            <label>每頁筆數</label>
            <select id="pageSizeSelect" onchange="changePageSize()">
                <option value="25" selected>25筆</option>
                <option value="50">50筆</option>
                <option value="75">75筆</option>
                <option value="100">100筆</option>
            </select>
        </div>
        <button class="btn-search" onclick="searchHosts()">搜尋</button>
    </div>

    <div id="countText" style="padding:8px 20px; color:var(--muted); display:flex; justify-content:space-between; align-items:center; font-size:14px;">
        <span id="totalText">資料讀取中...</span>
        <span id="topPagination" class="pagination"></span>
    </div>

    <div class="list-wrapper" id="scrollArea">
        <div class="list">
            <div class="list-head">
                <div class="col-1">序號</div>
                <div class="col-2">ID</div>
                <div class="col-3">縣市</div>
                <div class="col-4">鄉鎮</div>
                <div class="col-5">案場名稱</div>
                <div class="col-6">模擬地震</div>
            </div>
            <div id="rowsContainer"></div>
        </div>
        <div id="bottomPagination" class="pagination-container pagination"></div>
    </div>
</div>

<div class="modal-bg" id="confirmLayer">
    <div class="confirm-card">
        <div class="confirm-title" id="confirmTitle">確認動作</div>
        <div class="confirm-desc" id="confirmDesc">你確定要執行這項操作嗎？</div>
        <div class="confirm-btns">
            <button class="btn-close" onclick="hideConfirm()">取消</button>
            <button id="confirmExecuteBtn" class="btn-confirm">確定</button>
        </div>
    </div>
</div>

<button id="topBtn" onclick="scrollToTop()">TOP</button>

// --- 🔴 確認視窗邏輯 (參考自主機設定) ---
function askUserConfirm(title, desc, callback) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmDesc').textContent = desc;
    document.getElementById('confirmLayer').style.display = 'flex';
    const btn = document.getElementById('confirmExecuteBtn');
    btn.onclick = () => { hideConfirm(); callback(); };
}

function hideConfirm() { document.getElementById('confirmLayer').style.display = 'none'; }
function showCustomAlert(title, desc) { askUserConfirm(title, desc, hideConfirm); }

async function loadHostsFromServer() {
    const container = document.getElementById('rowsContainer');
    container.innerHTML = '<div class="empty">載入中...</div>';
    try {
        const res = await fetch(`${API_URL}?username=${encodeURIComponent(USERNAME)}`);
        if(!res.ok) throw new Error("API 連線失敗");
        allHosts = await res.json();
        searchHosts(); 
    } catch (e) {
        container.innerHTML = `<div class="empty" style="color:var(--danger)">讀取失敗: ${e.message}</div>`;
        document.getElementById('totalText').textContent = "共 0 筆資料";
    }
}

function initSelectors() {
    const countySelect = document.getElementById('countySelect');
    countySelect.innerHTML = '<option value="-">-</option>';
    Object.keys(countyTownMap).sort().forEach(c => {
        countySelect.innerHTML += `<option value="${c}">${c}</option>`;
    });

    countySelect.onchange = (e) => {
        const city = e.target.value;
        const townSelect = document.getElementById('townSelect');
        townSelect.innerHTML = '<option value="-">-</option>';
        if(countyTownMap[city]) {
            countyTownMap[city].forEach(t => {
                townSelect.innerHTML += `<option value="${t}">${t}</option>`;
            });
        }
    };
}

function searchHosts(){
    const idVal = document.getElementById('idInput').value.trim().toLowerCase();
    const countyVal = document.getElementById('countySelect').value;
    const townVal = document.getElementById('townSelect').value;
    
    filteredHosts = allHosts.filter(h => 
        (idVal === '' || (h.id && h.id.toLowerCase().includes(idVal))) &&
        (countyVal === '-' || h.county === countyVal) &&
        (townVal === '-' || h.town === townVal)
    );
    
    currentPage = 1;
    render();
}

function render(){
    const container = document.getElementById('rowsContainer');
    container.innerHTML = '';
    
    const total = filteredHosts.length;
    const totalPages = Math.ceil(total / pageSize) || 1;
    const start = (currentPage - 1) * pageSize;
    const pagedData = filteredHosts.slice(start, start + pageSize);

    if(pagedData.length === 0){
        container.innerHTML = '<div class="empty">查無資料 (或無此帳號權限)</div>';
    } else {
        pagedData.forEach((h, idx) => {
            const row = document.createElement('div');
            row.className = 'list-row';
            row.innerHTML = `
                <div class="col-1">${start + idx + 1}</div>
                <div class="col-2">${h.id || ''}</div>
                <div class="col-3">${h.county || ''}</div>
                <div class="col-4">${h.town || ''}</div>
                <div class="col-5">${h.name || ''}</div>
                <div class="col-6">
                    <select class="sim-select" id="sim_${h.id}">
                        <option value="-" selected>-</option>
                        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                        <option value="4">4</option><option value="5弱">5弱</option><option value="5強">5強</option>
                        <option value="6弱">6弱</option><option value="6強">6強</option><option value="7">7</option>
                    </select>
                    <button class="sim-btn" onclick="confirmAndSend('${h.id}', '${h.name}')">送出</button>
                </div>
            `;
            container.appendChild(row);
        });
    }
    
    document.getElementById('totalText').textContent = `共 ${total} 筆資料`;
    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const top = document.getElementById('topPagination');
    const bottom = document.getElementById('bottomPagination');
    top.innerHTML = ''; bottom.innerHTML = '';

    const createSpan = (txt, isDis, isCur, page) => {
        const s = document.createElement('span');
        s.textContent = txt;
        s.className = (isDis ? 'disabled' : '') + (isCur ? ' current' : '');
        if(!isDis && !isCur) s.onclick = () => { 
            currentPage = page; 
            render(); 
            document.getElementById('scrollArea').scrollTop = 0; 
        };
        return s;
    };

    top.appendChild(createSpan('第一頁', currentPage === 1, false, 1));
    for(let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
        top.appendChild(createSpan(i, false, i === currentPage, i));
    }
    top.appendChild(createSpan('最後一頁', currentPage === totalPages, false, totalPages));

    bottom.appendChild(createSpan('上一頁', currentPage === 1, false, currentPage - 1));
    for(let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
        bottom.appendChild(createSpan(i, false, i === currentPage, i));
    }
    bottom.appendChild(createSpan('下一頁', currentPage === totalPages, false, currentPage + 1));
}

function changePageSize() {
    pageSize = parseInt(document.getElementById('pageSizeSelect').value);
    currentPage = 1;
    render();
}

// 🔴 修改點：先確認再送出
function confirmAndSend(id, hostName) {
    const sel = document.getElementById('sim_'+id);
    const intensity = sel.value;

    if(intensity === '-'){ 
        showCustomAlert("提示", "請先選擇模擬地震強度"); 
        return; 
    }

    askUserConfirm("發送模擬地震", `確定要對主機 [ ${hostName} ] 發送震度 ${intensity} 的模擬地震嗎？`, () => executeSend(id, intensity));
}

async function executeSend(id, intensity){
    try {
        const response = await fetch('http://127.0.0.1:5009/api/simulate/single', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                host_id: id,
                intensity: intensity,
                username: USERNAME
            })
        });

        const result = await response.json();

        if (response.ok && result.success) {
            const intensityVal = (result.payload && result.payload.AreaList) ? result.payload.AreaList[0].IntensityX : intensity;
            showCustomAlert("成功", `地震模擬發送成功！\n目標: ${result.topic_sent}\n震度: ${intensityVal}`);
            document.getElementById('sim_'+id).value = '-';
        } else {
            showCustomAlert("失敗", `發送失敗: ${result.error || '未知錯誤'}`);
        }
    } catch (error) {
        showCustomAlert("錯誤", "伺服器連線失敗，請檢查後端狀態");
    }
}

function scrollToTop(){ 
    document.getElementById('scrollArea').scrollTo({top:0, behavior:'smooth'}); 
}

window.addEventListener('scroll', () => {
    // 監聽 scrollArea 而非 window
}, true);

document.getElementById('scrollArea').addEventListener('scroll', () => {
    document.getElementById('topBtn').style.display = (document.getElementById('scrollArea').scrollTop > 120) ? 'flex' : 'none';
});

window.onload = () => {
    initSelectors();
    loadHostsFromServer();
};
</script>
