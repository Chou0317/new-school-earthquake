<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>後台紀錄</title>
<style>
/* 樣式保持不變 */
:root{
    --bg:#6c6c6c; --card:#ffffff; --primary:#002b88; --primary-light:#3b82f6;
    --danger:#ef4444; --success:#10b981; --muted:#6b7280; --shadow:0 6px 18px rgba(15,23,42,0.08);
    font-family:-apple-system, BlinkMacSystemFont,'Segoe UI', Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;
}
html,body{ height:100%; margin:0; background:var(--bg); overflow: hidden; }
body{ padding:24px; display:flex; justify-content:center; }

.card{ 
    width:100%; max-width:1400px; background:var(--card); border-radius:0; 
    box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction:column; height:95vh;
}
.header{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; background:var(--primary); color:white; flex-shrink:0; }
.title{ font-size:20px; font-weight:600; }

.search-row { display:flex; align-items:center; gap:16px; padding:12px 20px; background:#f9fafb; flex-shrink:0; flex-wrap: wrap; }
.search-row .form-group{ display:flex; align-items:center; gap:6px; }
.search-row label{ font-size:14px; font-weight:500; color:var(--muted); }
.search-row input, .search-row select{ height:32px; padding:4px 8px; border-radius:6px; border:1px solid #ccc; font-size:13px; }

#countText{ padding:12px 20px; color:var(--muted); display:flex; justify-content:space-between; align-items:center; font-size:14px; background:#f9fafb; border-bottom:1px solid #eee; flex-shrink:0;}

.list-wrapper{ flex:1; overflow-y:auto; position:relative; background:#fff; }
.list{ width:100%; border-top:1px solid #eee; }
.list-head{ display:flex; gap:12px; padding:10px 8px; align-items:center; color:var(--muted); font-weight:700; background:#f9fafb; position:sticky; top:0; z-index:2; border-bottom:1px solid #eee; }
.list-row{ display:flex; align-items:center; gap:12px; padding:12px 8px; border-bottom:1px solid #f2f2f2; }

/* 欄位寬度設定 */
.col-1{ width:60px; flex-shrink:0; text-align:center; color:var(--muted); }
.col-2{ flex: 1.2; min-width:90px; text-align:center; } 
.col-3{ flex: 1.2; min-width:90px; text-align:center; } 
.col-target{ flex: 1.5; min-width:110px; text-align:center; } 
.col-4{ flex: 4; text-align:left; padding: 0 10px; line-height: 1.5; } 
.col-5{ width:80px; flex-shrink:0; text-align:center; } 
.col-6{ width:170px; flex-shrink:0; text-align:center; } 

.status-text { font-weight: 600; font-size: 14px; }
.text-black { color: #000000; }
.text-red { color: var(--danger); }

.pagination{ display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
.pagination span{ cursor:pointer; padding:3px 8px; color:var(--primary); font-weight:600; font-size:13px; border-radius:4px; }
.pagination span:hover:not(.disabled):not(.current){ background:#eee; }
.pagination span.current{ font-weight:700; text-decoration:underline; cursor:default; color:#111; }
.pagination span.disabled{ color:#999; cursor:default; }
.pagination-container{ display:flex; justify-content:center; padding:15px 0; background:#fff; border-top:1px solid #eee; }

.empty{ padding:40px; text-align:center; color:var(--muted); }
#topBtn{ position:fixed; right:20px; bottom:20px; width:42px; height:42px; border-radius:8px; background:var(--primary-light); color:#fff; border:none; cursor:pointer; display:none; z-index:200; align-items:center; justify-content:center; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="title">後台紀錄</div>
  </div>

  <div class="search-row">
    <div class="form-group">
      <label>操作帳號</label>
      <input type="text" id="searchOpUser" placeholder="輸入操作帳號">
    </div>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="searchOpName" placeholder="輸入姓名">
    </div>
    <div class="form-group">
      <label>帳號/群組</label>
      <input type="text" id="searchTarget" placeholder="輸入帳號/群組">
    </div>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="startDate"> 至 <input type="date" id="endDate">
    </div>
    <div class="form-group">
      <label>每頁筆數</label>
      <select id="pageSizeSelect">
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="75">75</option>
        <option value="100">100</option>
      </select>
    </div>
    <div style="display:flex; gap:8px;">
        <button class="btn-search" style="height:32px; padding:0 15px; border-radius:6px; background:var(--primary-light); color:white; border:none; cursor:pointer; font-weight:600;" onclick="searchLogs()">搜尋</button>
        <button class="btn-search" style="height:32px; padding:0 15px; border-radius:6px; background:var(--success); color:white; border:none; cursor:pointer; font-weight:600;" onclick="exportLogs()">匯出</button>
    </div>
  </div>

  <div id="countText">
    <span>共 0 筆資料</span>
    <span id="topPagination" class="pagination"></span>
  </div>

  <div class="list-wrapper" id="listWrapper">
    <div class="list">
      <div class="list-head">
        <div class="col-1">序號</div>
        <div class="col-2">操作帳號</div>
        <div class="col-3">姓名</div>
        <div class="col-target">帳號/群組</div>
        <div class="col-4">執行動作</div>
        <div class="col-5">狀態</div>
        <div class="col-6">時間</div>
      </div>
      <div id="rowsContainer"></div>
    </div>
    <div id="bottomPagination" class="pagination-container pagination"></div>
  </div>
</div>

<button id="topBtn" onclick="document.getElementById('listWrapper').scrollTop=0">TOP</button>

<script>
const API_BASE = 'http://127.0.0.1:5001/api';
let allLogs = [];
let filteredLogs = [];
let currentPage = 1;
let pageSize = 25; 

async function init() {
    document.getElementById('pageSizeSelect').addEventListener('change', (e) => {
        pageSize = parseInt(e.target.value);
        currentPage = 1;
        render();
    });
    const inputs = ['searchOpUser', 'searchOpName', 'searchTarget', 'startDate', 'endDate'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchLogs();
        });
    });
    await fetchLogs();
}

async function fetchLogs() {
    const container = document.getElementById('rowsContainer');
    container.innerHTML = '<div class="empty">資料載入中...</div>';
    try {
        const res = await fetch(`${API_BASE}/backend_logs`);
        if (!res.ok) throw new Error('API Error');
        const data = await res.json();
        
        allLogs = data.map(log => ({
            ...log,
            _actionText: getActionOnly(log),
            _targetText: (log.action_type === "登入" || log.action_type === "登出") ? "---" : (log.details.target || log.details.name || "---"),
            _timeText: formatDateTime(log.created_at)
        }));
        
        searchLogs(); 
    } catch (e) {
        container.innerHTML = '<div class="empty" style="color:var(--danger)">無法取得資料，請確認後端連線。</div>';
    }
}

function searchLogs() {
    const opUser = document.getElementById('searchOpUser').value.trim().toLowerCase();
    const opName = document.getElementById('searchOpName').value.trim().toLowerCase();
    const target = document.getElementById('searchTarget').value.trim().toLowerCase();
    const start = document.getElementById('startDate').value; 
    const end = document.getElementById('endDate').value;     

    filteredLogs = allLogs.filter(log => {
        if (opUser && !(log.operator_username && log.operator_username.toLowerCase().includes(opUser))) return false;
        if (opName && !(log.operator_name && log.operator_name.toLowerCase().includes(opName))) return false;
        if (target && !log._targetText.toLowerCase().includes(target)) return false;
        
        if (start || end) {
            const rawDate = log.created_at || log.create_time || log.time;
            if (!rawDate) return false;
            const d = new Date(rawDate);
            if (isNaN(d.getTime())) return false;
            const logDateOnly = d.getFullYear() + '-' + 
                                String(d.getMonth() + 1).padStart(2, '0') + '-' + 
                                String(d.getDate()).padStart(2, '0');
            if (start && logDateOnly < start) return false;
            if (end && logDateOnly > end) return false;
        }
        return true;
    });

    currentPage = 1;
    render();
}

// 匯出功能
function exportLogs() {
    if (filteredLogs.length === 0) {
        alert("目前無資料可供匯出");
        return;
    }

    // 1. 定義 CSV 標頭
    const headers = ["序號", "操作帳號", "姓名", "帳號/群組", "執行動作", "狀態", "時間"];
    
    // 2. 處理資料行 (加上引號避免逗號換行錯誤)
    const csvRows = filteredLogs.map((log, index) => [
        index + 1,
        `"${log.operator_username || ''}"`,
        `"${log.operator_name || ''}"`,
        `"${log._targetText}"`,
        `"${log._actionText.replace(/"/g, '""')}"`, // 將內文的引號轉義
        `"${log.status}"`,
        `"${log._timeText}"`
    ]);

    // 3. 組合 CSV 內容，加入 BOM (\ufeff) 解決 Excel 中文亂碼問題
    let csvContent = "\ufeff" + headers.join(",") + "\n" + csvRows.map(e => e.join(",")).join("\n");

    // 4. 建立下載連結
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    
    link.setAttribute("href", url);
    link.setAttribute("download", `後台紀錄匯出_${dateStr}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function render() {
    const container = document.getElementById('rowsContainer');
    const totalCount = filteredLogs.length;
    document.querySelector('#countText span').textContent = `共 ${totalCount} 筆資料`;

    const totalPages = Math.ceil(totalCount / pageSize) || 1;
    if(currentPage > totalPages) currentPage = totalPages;

    if (totalCount === 0) {
        container.innerHTML = '<div class="empty">查無資料</div>';
        renderPagination(1);
        return;
    }

    const startIdx = (currentPage - 1) * pageSize;
    const pageData = filteredLogs.slice(startIdx, startIdx + pageSize);

    let html = '';
    pageData.forEach((log, i) => {
        const statusClass = log.status === '成功' ? 'text-black' : 'text-red';
        html += `
            <div class="list-row">
                <div class="col-1">${startIdx + i + 1}</div>
                <div class="col-2">${log.operator_username || '---'}</div>
                <div class="col-3">${log.operator_name || '---'}</div>
                <div class="col-target">${log._targetText}</div>
                <div class="col-4">${log._actionText}</div>
                <div class="col-5">
                    <span class="status-text ${statusClass}">${log.status}</span>
                </div>
                <div class="col-6">${log._timeText}</div>
            </div>
        `;
    });

    container.innerHTML = html;
    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const top = document.getElementById('topPagination');
    const bottom = document.getElementById('bottomPagination');
    top.innerHTML = ''; bottom.innerHTML = '';

    const createSpan = (txt, isDis, isCur, page) => {
        const s = document.createElement('span');
        s.textContent = txt;
        s.className = (isDis ? 'disabled' : '') + (isCur ? ' current' : '');
        if(!isDis && !isCur) s.onclick = () => { 
            currentPage = page; 
            render(); 
            document.getElementById('listWrapper').scrollTop = 0;
        };
        return s;
    };

    top.appendChild(createSpan('第一頁', currentPage === 1, false, 1));
    for(let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
        top.appendChild(createSpan(i, false, i === currentPage, i));
    }
    top.appendChild(createSpan('最後一頁', currentPage === totalPages, false, totalPages));

    bottom.appendChild(createSpan('上一頁', currentPage === 1, false, currentPage - 1));
    for(let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
      bottom.appendChild(createSpan(i, false, i === currentPage, i));
    }
    bottom.appendChild(createSpan('下一頁', currentPage === totalPages, false, currentPage + 1));
}

function getActionOnly(log) {
    const details = log.details || {};
    const type = log.action_type;
    const changes = details.changes || {};

    if (type === "登入") return log.status === "成功" ? "登入" : `登入失敗: ${details.reason || ''}`;
    if (type === "登出") return "登出";
    
    if (type.includes("新增")) return `新增${type.replace('新增', '')}`;
    if (type.includes("刪除")) return `刪除${type.replace('刪除', '')}`;

    let actionList = [];
    for (let key in changes) {
        const change = changes[key];
        if (key === '狀態') {
            actionList.push(change.includes("-> 啟用") ? `啟用帳號` : `停用帳號`);
        } else if (key === '密碼') {
            actionList.push("重設密碼");
        } else if (key === '關聯案場') {
            const oldS = Array.isArray(change.舊) ? change.舊 : (change.舊?.split(',') || []);
            const newS = Array.isArray(change.新) ? change.新 : (change.新?.split(',') || []);
            const added = newS.filter(x => x && !oldS.includes(x));
            const removed = oldS.filter(x => x && !newS.includes(x));
            if (added.length) actionList.push(`增加案場(${added.join(', ')})`);
            if (removed.length) actionList.push(`減少案場(${removed.join(', ')})`);
        } else if (key === '權限項目' || key === '功能權限') {
            actionList.push("調整功能權限");
        } else {
            actionList.push(`修改${key}`);
        }
    }
    return actionList.length > 0 ? actionList.join('；') : type;
}

function formatDateTime(str) {
    if (!str) return '---';
    return str.replace('T', ' ').substring(0, 19);
}

document.getElementById('listWrapper').addEventListener('scroll', (e) => {
    document.getElementById('topBtn').style.display = e.target.scrollTop > 120 ? 'flex' : 'none';
});

init();
</script>
</body>
</html>
