<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EWS主機群組管理</title>
<style>
:root{ --bg:#6c6c6c; --card:#ffffff; --primary:#002b88; --primary-light:#3b82f6; --danger:#ef4444; --muted:#6b7280; --shadow:0 6px 18px rgba(15,23,42,0.08); --radius:12px; font-family:-apple-system, BlinkMacSystemFont,'Segoe UI', Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif; }
html,body{ height:100%; margin:0; background:var(--bg); }
body{ padding:24px; display:flex; justify-content:center; }
.card{ width:100%; max-width:1300px; background:var(--card); border-radius:0; box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction:column; height:95vh; }
.header{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 20px; background:var(--primary); color:white; }
.title{ font-size:20px; font-weight:600; }
.btn{ border:0; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:600; font-size:14px; }
.btn-primary{ background:var(--primary-light); color:white; }
.btn-danger{ background:var(--danger) !important; color:white !important; } /* 強制紅色 */
.btn-danger-modal{ background:var(--danger); color:white; border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-weight:600; margin-right: auto; }
.btn-close{ padding:8px 12px; border-radius:8px; border:1px solid #ccc; background:#ffffff; color:#374151; font-weight:600; font-size:14px; cursor:pointer; }
.list{ width:100%; border-top:1px solid #eee; border-bottom:1px solid #eee; margin-top:0; }
.list-wrapper{ flex:1; overflow-y:auto; }
.list-head{ display:flex; gap:12px; padding:10px 8px; align-items:center; color:var(--muted); font-weight:700; background:#f9fafb; position:sticky; top:0; z-index:2; }
.list-row{ display:flex; align-items:center; gap:12px; padding:12px 8px; border-bottom:1px solid #f2f2f2; }
.col-1{ width:60px; flex-shrink:0; text-align:center; color:var(--muted); }
/* 這裡將群組名稱與備註往右移一點 (加上 padding-left) */
.col-2,.col-3{ flex:1; min-width:120px; padding-left: 20px; }
.col-4{ width:100px; flex-shrink:0; text-align:center; }
.icon-btn{ padding:6px 12px; border-radius:8px; border:1px solid rgba(0,0,0,0.1); background:#fff; cursor:pointer; font-weight:600; color:#000; }
.icon-btn:hover{ background:#f3f4f6; }
.empty{ padding:28px; text-align:center; color:var(--muted); }
.search-row { display: flex; align-items: center; gap: 12px; padding: 12px 20px; background: #f9fafb; border-radius: 8px; margin: 0 16px 12px 16px; }
.search-row .form-group{ display: flex; align-items: center; gap: 4px; }
.search-row label{ font-size: 15px; font-weight: 500; color: var(--muted); white-space: nowrap; }
.search-row input[type="text"], .search-row select{ height: 32px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
.btn-search{ height: 32px; padding: 0 14px; border-radius: 6px; background: var(--primary-light); color: #fff; border: none; cursor: pointer; font-weight: 600; font-size: 14px; }
.pagination{ display:flex; gap:4px; flex-wrap:wrap; }
.pagination span{ cursor:pointer; padding:3px 5px; color:var(--primary); font-weight:600; font-size:12px; }
.pagination span.current{ font-weight:700; text-decoration:underline; cursor:default; color:#111; }
.pagination-container{ display:flex; justify-content:center; padding:8px 0; }
.modal-backdrop{ position:fixed; inset:0; background:rgba(2,6,23,0.45); display:none; align-items:center; justify-content:center; z-index:100; }
.modal{ background:var(--card); border-radius:var(--radius); padding:0; max-width:560px; width:92%; box-shadow:var(--shadow); overflow:hidden; }
.modal-header{ padding:16px 20px; background:var(--primary); color:white; font-size:18px; font-weight:600; }
.modal-body{ padding:18px; max-height:60vh; overflow-y:auto; }
.form-row{ display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.form-row label{ width:90px; font-size:15px; color:var(--muted); }
.form-row input[type="text"], .form-row select{ flex:1; padding:6px 8px; border-radius:6px; border:1px solid #ccc; }
.modal-footer{ display:flex; gap:8px; justify-content:flex-end; padding:12px 18px; background:#f9fafb; border-top:1px solid #eee; }
.added-sites{ border-top:1px solid #eee; margin-top:10px; padding-top:10px; }
.site-item{ display:flex; align-items:center; justify-content:space-between; background:#f1f5f9; padding:6px 10px; border-radius:6px; margin-bottom:4px; font-size:14px; }
.site-item button{ border:none; background:none; cursor:pointer; font-weight:bold; color:var(--danger); font-size:18px; }

/* 確認對話框層 (Confirm Layer) */
#confirmLayer { z-index: 500; background: rgba(0,0,0,0.7); display:none; position:fixed; inset:0; align-items:center; justify-content:center; }
.confirm-card { width: 350px; padding: 24px; background: #fff; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
.confirm-btns { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="title">EWS主機群組管理</div>
    <button class="btn btn-primary" onclick="openModal()">＋ 新增群組</button>
  </div>

  <div class="search-row">
    <div class="form-group">
      <label>群組名稱</label>
      <input id="searchName" type="text" placeholder="輸入群組名稱" />
    </div>
    <div class="form-group">
      <label>每頁筆數</label>
      <select id="pageSizeSelect" onchange="changePageSize()">
        <option value="25">25</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>
    </div>
    <button class="btn-search" onclick="searchGroup()">搜尋</button>
  </div>

  <div style="display:flex; justify-content:space-between; padding:8px 20px; align-items:center;">
    <div id="countText" style="color:var(--muted); font-size:14px;">共 0 筆資料</div>
    <div id="topPagination" class="pagination"></div>
  </div>

  <div class="list-wrapper">
    <div class="list">
        <div class="list-head">
          <div class="col-1">序號</div>
          <div class="col-2">群組名稱</div>
          <div class="col-3">備註</div>
          <div class="col-4">操作</div>
        </div>
        <div id="rowsContainer"></div>
    </div>
  </div>
  <div id="bottomPagination" class="pagination-container"></div>
</div>

<div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-header" id="modalTitle">新增群組</div>
      <div class="modal-body">
        <div class="form-row">
          <label>群組名稱</label>
          <input id="inputName" type="text" />
        </div>
        <div class="form-row">
          <label>備註</label>
          <input id="inputRemark" type="text" />
        </div>
        <div class="form-row" id="siteSelectRow">
          <select id="siteSelect"><option value="">載入中...</option></select>
          <button class="btn btn-primary" onclick="addSite()">加入</button>
        </div>
        <div class="added-sites"><div id="addedSites"></div></div>
      </div>
      <div class="modal-footer">
        <button class="btn-danger-modal" id="btnDeleteInModal" style="display:none;" onclick="handleDeleteFromModal()">刪除</button>
        <button class="btn-close" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="saveBtn" onclick="handleConfirmSave()">確認</button>
      </div>
    </div>
</div>

<div id="confirmLayer">
    <div class="confirm-card">
        <h3 id="confirmTitle" style="margin-top:0">確認動作</h3>
        <p id="confirmDesc" style="color:#666; font-size:14px; line-height: 1.5;"></p>
        <div class="confirm-btns">
            <button class="btn-close" onclick="hideConfirm()">取消</button>
            <button id="confirmExecuteBtn" class="btn btn-primary">確定</button>
        </div>
    </div>
</div>

<script>
let groups = [];
let filteredGroups = [];
let editingId = null;
let currentPage = 1;
let pageSize = 25;
const API_URL = 'http://127.0.0.1:5000/api';

const rowsContainer = document.getElementById('rowsContainer');
const addedSitesDiv = document.getElementById('addedSites');
const siteSelect = document.getElementById('siteSelect');

// 初始化
async function init() {
    await loadSiteNames();
    await loadGroups();
}

// 通用確認視窗 - 修正按鈕顏色邏輯
function askConfirm(title, desc, callback, isDanger = false) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmDesc').textContent = desc;
    document.getElementById('confirmLayer').style.display = 'flex';
    
    const btn = document.getElementById('confirmExecuteBtn');
    // 如果是危險動作（如刪除），將按鈕背景設為紅色
    if (isDanger) {
        btn.classList.add('btn-danger');
    } else {
        btn.classList.remove('btn-danger');
    }
    
    btn.onclick = () => { hideConfirm(); callback(); };
}

function hideConfirm() { document.getElementById('confirmLayer').style.display = 'none'; }

async function loadSiteNames() {
    try {
        const res = await fetch(`${API_URL}/site-names`);
        const names = await res.json();
        siteSelect.innerHTML = '<option value="">選擇案場...</option>';
        names.forEach(n => siteSelect.innerHTML += `<option value="${n}">${n}</option>`);
    } catch(e) { siteSelect.innerHTML = '<option value="">載入失敗</option>'; }
}

async function loadGroups() {
    try {
        const res = await fetch(`${API_URL}/groups`);
        groups = await res.json();
        searchGroup();
    } catch(e) { console.error(e); }
}

function searchGroup() {
    const sname = document.getElementById('searchName').value.trim().toLowerCase();
    filteredGroups = groups.filter(g => !sname || g.name.toLowerCase().includes(sname));
    currentPage = 1;
    renderList();
}

function renderList() {
    rowsContainer.innerHTML = '';
    const start = (currentPage - 1) * pageSize;
    const data = filteredGroups.slice(start, start + pageSize);
    document.getElementById('countText').textContent = `共 ${filteredGroups.length} 筆資料`;
    
    if(data.length === 0) {
        rowsContainer.innerHTML = '<div class="empty">目前沒有資料</div>';
        return;
    }
    data.forEach((g, idx) => {
        const div = document.createElement('div');
        div.className = 'list-row';
        div.innerHTML = `
            <div class="col-1">${start + idx + 1}</div>
            <div class="col-2">${escapeHtml(g.name)}</div>
            <div class="col-3">${escapeHtml(g.remark || '')}</div>
            <div class="col-4"><button class="icon-btn" onclick="openEdit(${start + idx})">編輯</button></div>
        `;
        rowsContainer.appendChild(div);
    });
    renderPagination();
}

function openModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '新增群組';
    document.getElementById('inputName').value = '';
    document.getElementById('inputRemark').value = '';
    document.getElementById('btnDeleteInModal').style.display = 'none';
    addedSitesDiv.innerHTML = '';
    document.getElementById('modal').style.display = 'flex';
}

function openEdit(idx) {
    const g = filteredGroups[idx];
    editingId = g.id;
    document.getElementById('modalTitle').textContent = '編輯群組';
    document.getElementById('inputName').value = g.name;
    document.getElementById('inputRemark').value = g.remark || '';
    document.getElementById('btnDeleteInModal').style.display = 'block';
    addedSitesDiv.innerHTML = '';
    if(g.sites) g.sites.forEach(s => addSiteToUI(s));
    document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function addSite() {
    const val = siteSelect.value;
    if(!val) return;
    const exists = Array.from(addedSitesDiv.querySelectorAll('span')).some(s => s.textContent === val);
    if(exists) return alert("此案場已在清單中");
    addSiteToUI(val);
    siteSelect.value = "";
}

function addSiteToUI(name) {
    const div = document.createElement('div');
    div.className = 'site-item';
    div.innerHTML = `<span>${escapeHtml(name)}</span><button onclick="this.parentNode.remove()">×</button>`;
    addedSitesDiv.appendChild(div);
}

function handleConfirmSave() {
    const name = document.getElementById('inputName').value.trim();
    if(!name) return alert("請輸入群組名稱");
    askConfirm("儲存設定", `確定要儲存群組 [ ${name} ] 嗎？`, executeSave, false);
}

async function executeSave() {
    const payload = { 
        id: editingId, 
        name: document.getElementById('inputName').value.trim(), 
        remark: document.getElementById('inputRemark').value.trim(), 
        sites: Array.from(addedSitesDiv.querySelectorAll('span')).map(s => s.textContent)
    };
    try {
        const res = await fetch(`${API_URL}/groups`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if(res.ok) { closeModal(); await loadGroups(); }
    } catch(e) { alert("網路錯誤"); }
}

function handleDeleteFromModal() {
    const name = document.getElementById('inputName').value;
    // 這裡傳入 true，讓確認視窗的按鈕變成紅色
    askConfirm("⚠️ 確定刪除？", `您確定要刪除群組 [ ${name} ] 嗎？此操作不可還原。`, executeDelete, true);
}

async function executeDelete() {
    try {
        const res = await fetch(`${API_URL}/groups/${editingId}`, { method: 'DELETE' });
        if(res.ok) { closeModal(); await loadGroups(); }
    } catch(e) { alert("刪除失敗"); }
}

function renderPagination() {
    const totalPages = Math.ceil(filteredGroups.length / pageSize);
    const bottom = document.getElementById('bottomPagination');
    const top = document.getElementById('topPagination');
    bottom.innerHTML = ''; top.innerHTML = '';
    if(totalPages <= 1) return;

    for(let i = 1; i <= totalPages; i++) {
        const span = document.createElement('span');
        span.textContent = i;
        if(i === currentPage) span.className = 'current';
        span.onclick = () => { currentPage = i; renderList(); };
        top.appendChild(span.cloneNode(true));
        bottom.innerHTML += '<div class="pagination"></div>'; // 此處維持你原本的結構
        bottom.querySelector('.pagination').appendChild(span);
    }
}

function changePageSize() {
    pageSize = parseInt(document.getElementById('pageSizeSelect').value);
    currentPage = 1;
    renderList();
}

function escapeHtml(text) {
    return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

document.getElementById('modal').onclick = function(e) { if(e.target === this) closeModal(); };

init();
</script>
</body>
</html>
