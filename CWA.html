<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>氣象署連線設定</title>
<style>
/* --- 完全保留原始 CSS 變數與樣式 --- */
:root{
  --bg:#6c6c6c;
  --card:#ffffff;
  --primary:#002b88;
  --primary-light:#3b82f6;
  --danger:#ef4444;
  --muted:#6b7280;
  --shadow:0 6px 18px rgba(15,23,42,0.08);
  --radius:12px;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;
}
html,body{height:100%;margin:0;background:var(--bg);}
body{padding:24px;display:flex;justify-content:center;}

.card{ width:100%; max-width:1300px; background:var(--card); border-radius:0; box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction:column; height:95vh;}
.header{ padding:16px 20px; background:var(--primary); color:#fff; font-size:20px; font-weight:600; }
.search-row{ display:flex; flex-wrap:wrap; gap:12px; padding:12px 20px; background:#f9fafb; align-items:center; }
.form-group{ display:flex; align-items:center; gap:6px; }
label{ color:var(--muted); white-space:nowrap; }
select,input{ height:32px; padding:4px 8px; border-radius:6px; border:1px solid #ccc; font-size:14px; }
.btn-search{ height:32px; padding:0 14px; border:none; border-radius:6px; background:var(--primary-light); color:#fff; cursor:pointer; font-weight:600; display:flex; align-items:center; justify-content:center; }
#pageSizeSelect{height:32px;padding:4px 8px;border-radius:6px;border:1px solid #ccc;font-size:14px;}

.top-info{ display:flex; justify-content:space-between; align-items:center; padding:8px 20px; color:var(--muted); font-size:14px; }

/* 🔴 頁碼樣式：同步主機設定 (細體、藍色文字、底線效果) */
.pagination{ display:flex; gap:4px; flex-wrap:wrap; }
.pagination span{ cursor:pointer; padding:3px 5px; color:var(--primary); font-weight:600; font-size:12px; }
.pagination span.current{ font-weight:700; text-decoration:underline; cursor:default; color:#111; }
.pagination span.disabled{ color:#999; cursor:default; }

.list{ border-top:1px solid #eee; overflow:auto; flex:1; }
.list-head,.list-row{ display:flex; align-items:center; padding:10px 8px; min-width:1000px; }
.list-head{ background:#f9fafb; color:var(--muted); font-weight:700; position:sticky; top:0; z-index:2; }
.list-row{ border-bottom:1px solid #f2f2f2; }

.col-1{ flex:0 0 60px; max-width:60px; display:flex; align-items:center; justify-content:flex-start; padding-left:16px; box-sizing:border-box; }
.col-2,.col-3,.col-4,.col-5{ flex:1; display:flex; align-items:center; justify-content:center; min-width:120px; }
.col-6{ flex:0 0 100px; display:flex; align-items:center; justify-content:flex-end; padding-right:20px; box-sizing:border-box; }
.icon-btn{ padding:6px 8px; border-radius:8px; border:1px solid rgba(0,0,0,0.06); background:transparent; cursor:pointer; font-weight:600; }
.empty{ padding:28px; text-align:center; color:var(--muted); width:100%; }

.modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:100; }
.modal{ background:#fff; width:92%; max-width:520px; border-radius:12px; overflow:hidden; }
.modal-header{ background:var(--primary); color:#fff; padding:14px 18px; font-weight:600; }
.modal-body{padding:18px;}
.modal-body .form-group{margin-bottom:12px;}
.modal-footer{ padding:12px 18px; display:flex; justify-content:flex-end; gap:8px; background:#f9fafb; }
.btn{ padding:6px 14px; border-radius:6px; border:none; cursor:pointer; font-weight:600; }
.btn-primary{background:var(--primary-light);color:#fff;}
.btn-close{ padding:8px 12px; border-radius:8px; border:1px solid #ccc; background:#ffffff; color:#374151; font-weight:600; font-size:14px; cursor:pointer; }

#confirmLayer { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:500; }
.confirm-card { width: 380px; padding: 24px; background: #fff; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
.confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #1f2937; }
.confirm-desc { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 12px; justify-content: center; }

#topBtn{ position:fixed; right:20px; bottom:20px; width:44px; height:44px; border:none; border-radius:8px; background:var(--primary-light); color:#fff; display:none; cursor:pointer; }
.pagination-container{ display:flex; justify-content:center; padding:8px 0; background:#fff; border-top:1px solid #eee; }
</style>
</head>

<div class="card">
  <div class="header">氣象署連線設定</div>

  <div class="search-row">
    <div class="form-group"><label>縣市</label><select id="citySelect"></select></div>
    <div class="form-group"><label>鄉鎮</label><select id="townSelect"></select></div>
    <div class="form-group"><label>ID</label><input id="idInput" placeholder="輸入ID"/></div>
    <div class="form-group"><label>案場名稱</label><input id="nameInput" placeholder="輸入案場名稱"/></div>

<div class="modal-backdrop" id="modal">

      <div class="form-group">

    </div>
    <div class="modal-footer">
      <button class="btn btn-close" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="handleConfirmSave()">確認</button>
    </div>
  </div>
</div>

<div id="confirmLayer">

        <div class="confirm-title" id="confirmTitle">確認動作</div>

</div>

<button id="topBtn" onclick="scrollToTop()">TOP</button>

function askUserConfirm(title, desc, callback) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmDesc').textContent = desc;
    document.getElementById('confirmLayer').style.display = 'flex';
    const btn = document.getElementById('confirmExecuteBtn');
    btn.onclick = () => { hideConfirm(); callback(); };
}
function hideConfirm() { document.getElementById('confirmLayer').style.display = 'none'; }
function showCustomAlert(title, desc) { askUserConfirm(title, desc, hideConfirm); }

async function init() {
    populateCityTown();
    await fetchData();
}

async function fetchData(keepFilter = false) {
    try {
        const res = await fetch(`${API_URL}/cwa`);
        allData = await res.json();
        if (keepFilter) {
            search(false); 
        } else {
            filteredData = [...allData];
            currentPage = 1;
            render();
        }
    } catch (e) {
        document.getElementById('rows').innerHTML = '<div class="empty">連線後端失敗</div>';
    }
}

function render() {
    const rowContainer = document.getElementById('rows');
    rowContainer.innerHTML = '';
    const total = filteredData.length;
    pageSize = parseInt(document.getElementById('pageSizeSelect').value) || 25;
    const totalPages = Math.ceil(total / pageSize) || 1;
    
    if(currentPage > totalPages) currentPage = totalPages;
    if(currentPage < 1) currentPage = 1;

    const start = (currentPage - 1) * pageSize;
    const pageData = filteredData.slice(start, start + pageSize);
    
    document.getElementById('countText').textContent = `共 ${total} 筆資料`;
    
    if (pageData.length === 0) {
        rowContainer.innerHTML = '<div class="empty">查無符合條件的資料</div>';
    } else {
        pageData.forEach((e, i) => {
            const row = document.createElement('div');
            row.className = 'list-row';
            row.innerHTML = `
                <div class="col-1">${start + i + 1}</div>
                <div class="col-2">${e.id}</div>
                <div class="col-3">${e.name}</div>
                <div class="col-4">${e.city || ''}</div>
                <div class="col-5">${e.town || ''}</div>
                <div class="col-6">
                    <button class="icon-btn" onclick="openModal('${e.id}','${e.name}','${e.account || ''}','${e.password || ''}')">設定</button>
                </div>`;
            rowContainer.appendChild(row);
        });
    }
    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const top = document.getElementById('topPagination');
    const bottom = document.getElementById('bottomPagination');
    top.innerHTML = ''; bottom.innerHTML = '';
    
    const actualTotal = totalPages < 1 ? 1 : totalPages;

    const createSpan = (txt, isDis, isCur, page) => {
        const s = document.createElement('span');
        s.textContent = txt;
        s.className = (isDis ? 'disabled' : '') + (isCur ? ' current' : '');
        if(!isDis && !isCur) s.onclick = () => { 
            currentPage = page; 
            render(); 
            document.getElementById('listWrapper').scrollTop = 0;
        };
        return s;
    };

    const startPage = Math.max(1, currentPage - 2);
    const endPage = Math.min(actualTotal, currentPage + 2);

    // 頂部
    top.appendChild(createSpan('第一頁', currentPage === 1, false, 1));
    for (let i = startPage; i <= endPage; i++) {
        top.appendChild(createSpan(i, false, i === currentPage, i));
    }
    top.appendChild(createSpan('最後一頁', currentPage === actualTotal, false, actualTotal));

    // 底部 (含上一頁 / 下一頁)
    bottom.appendChild(createSpan('上一頁', currentPage === 1, false, currentPage - 1));
    for (let i = startPage; i <= endPage; i++) {
        bottom.appendChild(createSpan(i, false, i === currentPage, i));
    }
    bottom.appendChild(createSpan('下一頁', currentPage === actualTotal, false, currentPage + 1));
}

function search(resetPage = true) {
    const city = document.getElementById('citySelect').value;
    const town = document.getElementById('townSelect').value;
    const id = document.getElementById('idInput').value.trim().toLowerCase();
    const name = document.getElementById('nameInput').value.trim().toLowerCase();
    
    if(resetPage) currentPage = 1;
    
    filteredData = allData.filter(e => {
        const dCity = (e.city || '').replace('台', '臺');
        const sCity = city.replace('台', '臺');
        return (city === '' || city === '-' || dCity === sCity) && 
               (town === '' || town === '-' || e.town === town) &&
               (id === '' || e.id.toLowerCase().includes(id)) &&
               (name === '' || e.name.toLowerCase().includes(name));
    });
    render();
}

function changePageSize() {
    pageSize = parseInt(document.getElementById('pageSizeSelect').value);
    currentPage = 1;
    render();
}

function openModal(id, name, account, pwd) {
    document.getElementById('mId').value = id;
    document.getElementById('mName').value = name;
    document.getElementById('mAccount').value = account;
    const pwdInput = document.getElementById('mPwd');
    pwdInput.value = (pwd && pwd.trim() !== '') ? pwd : '';
    document.getElementById('modal').style.display = 'flex';
}
function closeModal() { document.getElementById('modal').style.display = 'none'; }

function handleConfirmSave() {
    const acc = document.getElementById('mAccount').value.trim();
    const pwd = document.getElementById('mPwd').value;
    const id = document.getElementById('mId').value;
    if(!acc) return showCustomAlert("提示", "帳號不能為空");
    if(!pwd || pwd.trim() === '') return showCustomAlert("提示", "密碼不能為空");
    askUserConfirm("儲存設定", `確定要儲存主機 [ ${id} ] 的氣象署連線設定並發布至 MQTT 嗎？`, confirmSave);
}

async function confirmSave() {
    const payload = {
        id: document.getElementById('mId').value,
        account: document.getElementById('mAccount').value.trim(),
        password: document.getElementById('mPwd').value
    };
    try {
        const res = await fetch(`${API_URL}/cwa`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (res.ok) {
            closeModal();
            await fetchData(true);
            showCustomAlert("成功", "設定已儲存並發布成功。");
        } else {
            showCustomAlert("失敗", "儲存失敗，請檢查後端連線。");
        }
    } catch (e) {
        showCustomAlert("錯誤", "連線後端發生異常。");
    }
}

function populateCityTown() {
    const citySelect = document.getElementById('citySelect');
    const townSelect = document.getElementById('townSelect');
    citySelect.innerHTML = '<option value="-">-</option>';
    Object.keys(taiwanDistricts).sort().forEach(city => {
        const o = document.createElement('option'); o.value = o.textContent = city; citySelect.appendChild(o);
    });
    citySelect.onchange = () => {
        const selectedCity = citySelect.value;
        townSelect.innerHTML = '<option value="-">-</option>';
        if (selectedCity && taiwanDistricts[selectedCity]) {
            taiwanDistricts[selectedCity].forEach(town => {
                const o = document.createElement('option'); o.value = o.textContent = town; townSelect.appendChild(o);
            });
        }
    };
}

function scrollToTop() { document.getElementById('listWrapper').scrollTop = 0; }
document.getElementById('listWrapper').addEventListener('scroll', () => { 
    document.getElementById('topBtn').style.display = document.getElementById('listWrapper').scrollTop > 120 ? 'block' : 'none'; 
});

init();
</script>
