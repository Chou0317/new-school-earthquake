<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>變更密碼</title>

  <style>
    /* 保持您原始的所有 CSS 樣式不變 */
    :root{
      --bg: #6c6c6c;
      --card: #ffffff;
      --input-bg: #f9fafb;
      --primary: #002b88;
      --primary-light: #3b82f6;
      --muted: #6b7280;
      --shadow: 0 6px 18px rgba(15,23,42,0.08);
      --radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    }
    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:100%;
      max-width:1300px;
      background:var(--card);
      border-radius:0;
      box-shadow:var(--shadow);
      box-sizing:border-box;
      margin-top:40px;
      overflow:hidden;
    }
    .header{
      padding:16px 20px;
      background:var(--primary);
      color:white;
      font-size:20px;
      font-weight:600;
    }
    .form{
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    .form-row{
      display:flex;
      flex-direction:column;
      gap:6px;
      position:relative;
    }
    .form-row label{font-size:13px;color:var(--muted)}
    .input-wrapper{
      position:relative;
    }
    .input-wrapper input[type="text"],
    .input-wrapper input[type="password"]{
      width:100%;
      padding:10px 40px 10px 10px;
      border-radius:8px;
      border:1px solid #e6e6e6;
      font-size:14px;
      background:var(--input-bg);
      box-sizing:border-box;
    }
    .eye-btn{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      background:transparent;
      border:none;
      cursor:pointer;
      font-size:22px;
      color:var(--muted);
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .btn{
      border:0;
      padding:10px 16px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      font-size:14px;
    }
    .btn-primary{background:var(--primary-light); color:white}
  </style>
</head>
<body>
  <div class="card">
    <div class="header">變更密碼</div>

    <div class="form">
      <div class="form-row">
        <label for="account">登入帳號</label>
        <div class="input-wrapper">
          <input id="account" type="text" placeholder="輸入帳號" />
        </div>
      </div>

      <div class="form-row">
        <label for="oldPassword">原密碼</label>
        <div class="input-wrapper">
          <input id="oldPassword" type="password" placeholder="輸入原密碼" />
          <button class="eye-btn" type="button" data-target="oldPassword">👁</button>
        </div>
      </div>

      <div class="form-row">
        <label for="newPassword">新密碼</label>
        <div class="input-wrapper">
          <input id="newPassword" type="password" placeholder="輸入新密碼(大小寫英文+數字)" />
          <button class="eye-btn" type="button" data-target="newPassword">👁</button>
        </div>
      </div>

      <div class="form-row">
        <label for="confirmPassword">確認新密碼</label>
        <div class="input-wrapper">
          <input id="confirmPassword" type="password" placeholder="再次輸入新密碼(大小寫英文+數字)" />
          <button class="eye-btn" type="button" data-target="confirmPassword">👁</button>
        </div>
      </div>

      <button class="btn btn-primary" id="changeBtn">確認</button>
    </div>
  </div>

  <script>
    const API_BASE = 'http://127.0.0.1:5001/api';

    // 1. 處理眼睛圖示功能
    const eyeBtns = document.querySelectorAll('.eye-btn');
    eyeBtns.forEach(btn => {
      const targetId = btn.getAttribute('data-target');
      const input = document.getElementById(targetId);

      const show = () => input.type = 'text';
      const hide = () => input.type = 'password';

      btn.addEventListener('mousedown', show);
      btn.addEventListener('mouseup', hide);
      btn.addEventListener('mouseleave', hide);
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); show(); });
      btn.addEventListener('touchend', hide);
    });

    // 2. 處理變更密碼 API 串接
    document.getElementById('changeBtn').addEventListener('click', async () => {
      const username = document.getElementById('account').value.trim();
      const oldPassword = document.getElementById('oldPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // 前端基本驗證
      if (!username || !oldPassword || !newPassword || !confirmPassword) {
        return alert('請填寫所有欄位');
      }

      if (newPassword !== confirmPassword) {
        return alert('新密碼與確認密碼不一致');
      }

      try {
        const res = await fetch(`${API_BASE}/change_password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            oldPassword,
            newPassword
          })
        });

        const data = await res.json();

        if (res.ok) {
          alert('密碼變更成功！');
          // 清空密碼欄位
          document.getElementById('oldPassword').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';
        } else {
          // 顯示後端回傳的錯誤訊息 (例如: 原密碼錯誤、不符合規範)
          alert(data.error || '變更失敗');
        }
      } catch (e) {
        alert('連線伺服器失敗，請檢查後端是否啟動');
      }
    });

    // 3. 未來擴充：進入頁面自動撈取帳號
    window.onload = () => {
      const userData = JSON.parse(sessionStorage.getItem('userData'));
      if (userData && userData.username) {
        const accInput = document.getElementById('account');
        accInput.value = userData.username;
        accInput.disabled = true; // 禁止修改帳號，只能改密碼
      } else {
    // 如果沒登入資訊，強制踢回登入頁
        alert('請先登入系統');
        window.location.href = "login.html";
      }
    };
  </script>
</body>
</html>
