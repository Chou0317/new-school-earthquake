<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>地震模擬排程</title>
<style>
/* --- 保留原始樣式 --- */
:root{
  --bg:#6c6c6c;
  --card:#ffffff;
  --primary:#002b88;
  --primary-light:#3b82f6;
  --secondary-light:#60a5fa;
  --danger:#ef4444;
  --muted:#6b7280;
  --shadow:0 6px 18px rgba(15,23,42,0.08);
  --radius:12px;
  font-family:-apple-system, BlinkMacSystemFont,'Segoe UI', Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;
}
html,body{ height:100%; margin:0; background:var(--bg); }
body{ padding:24px; display:flex; justify-content:center; }
.card{ width:100%; max-width:1300px; background:var(--card); border-radius:0; box-shadow:var(--shadow); overflow:hidden; margin-top:20px; }
.header{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 20px; background:var(--primary); color:white; }
.title{ font-size:20px; font-weight:600; }
.search-row { display:flex; align-items:center; gap:12px; padding:12px 20px; background:#f9fafb; border-radius:8px; margin:0 16px 12px 16px; flex-wrap:wrap; }
.search-row .form-group{ display:flex; align-items:center; gap:6px; }
.search-row label{ font-size:15px; font-weight:500; color:var(--muted); white-space:nowrap; line-height:32px; }
.search-row input, .search-row select{ height:32px; padding:4px 8px; border-radius:6px; border:1px solid #ccc; font-size:14px; background:#fff; }
.btn-search{ height:32px; padding:0 14px; border-radius:6px; background:var(--primary-light); color:#fff; border:none; cursor:pointer; font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:center; }
.btn-close{ height:32px; padding:0 16px; border-radius:6px; border:1px solid #ccc; background:#ffffff; color:#374151; font-weight:600; cursor:pointer; }
.add-btn{ height:32px; padding:0 16px; border-radius:6px; background:var(--secondary-light); color:white; border:none; cursor:pointer; font-weight:600; font-size:14px; display:flex; align-items:center; justify-content:center; }
.list{ width:100%; border-top:1px solid #eee; border-bottom:1px solid #eee; margin-top:0; }
.list-head{ display:flex; gap:12px; padding:10px 8px; align-items:center; color:var(--muted); font-weight:700; background:#f9fafb; }
.list-row{ display:flex; align-items:center; gap:12px; padding:12px 8px; border-bottom:1px solid #f2f2f2; }
.col-1{ width:60px; flex-shrink:0; text-align:center; color:var(--muted); }
.col-2,.col-3,.col-4{ flex:1; min-width:140px; }
.col-5{ width:120px; flex-shrink:0; text-align:center; }
.col-6{ width:90px; flex-shrink:0; text-align:center; }
.icon-btn{ padding:6px 8px; border-radius:8px; border:1px solid rgba(0,0,0,0.06); background:transparent; cursor:pointer; font-weight:600; }
.empty{ padding:28px; text-align:center; color:var(--muted); }

/* Modal 基礎樣式 */
.modal-backdrop{ position:fixed; inset:0; background:rgba(2,6,23,0.45); display:none; align-items:center; justify-content:center; z-index:100; }
.modal{ background:var(--card); border-radius:var(--radius); padding:0; max-width:640px; width:92%; box-shadow:var(--shadow); overflow:hidden; }
.modal-header{ padding:16px 20px; background:var(--primary); color:white; font-size:18px; font-weight:600; }
.modal-body{ padding:18px; color:#111; max-height:60vh; overflow:auto; display:flex; flex-direction:column; gap:12px; }
.modal-body .form-group{ display:flex; flex-direction:column; gap:4px; }
.modal-body label{ font-size:14px; font-weight:500; color:var(--muted); }
.modal-body input, .modal-body select{ height:32px; padding:4px 8px; border-radius:6px; border:1px solid #ccc; font-size:14px; }
.modal-footer{ display:flex; gap:8px; justify-content:flex-end; padding:12px 18px; background:#f9fafb; }

/* 🔴 確認 Modal (由 EWS主機設定 參考而來) */
#confirmLayer { position:fixed; inset:0; z-index: 500; background: rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; }
.confirm-card { width: 380px; padding: 24px; background: #fff; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
.confirm-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #1f2937; }
.confirm-desc { font-size: 14px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
.confirm-btns { display: flex; gap: 12px; justify-content: center; }
.btn-confirm { background: var(--primary-light); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
.btn-danger-confirm { background: var(--danger); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
.btn-delete-modal { background: var(--danger); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; margin-right: auto; }

#topBtn{ position:fixed; right:20px; bottom:20px; width:44px; height:44px; background:var(--primary-light); color:white; border:none; border-radius:8px; display:none; align-items:center; justify-content:center; cursor:pointer; z-index:200; }
@media (max-width:720px){ .list-head{ font-size:13px; } .col-2,.col-3,.col-4{ min-width:80px; } .search-row{ gap:8px; } }
</style>
</head>
<body>

<div class="card" id="mainCard">
  <div class="header">
    <div class="title">地震模擬排程</div>
    <button class="add-btn" onclick="openAddModal()">+ 新增排程</button>
  </div>

  <div class="search-row">
    <div class="form-group">
      <label for="themeInput">主題</label>
      <input type="text" id="themeInput" placeholder="輸入演練主題">
    </div>
    <div class="form-group">
      <label>開始日期</label>
      <input type="date" id="startDate" onchange="updateEndMin()">
    </div>
    <div class="form-group">
      <label>結束日期</label>
      <input type="date" id="endDate" onchange="updateStartMax()">
    </div>
    <button class="btn-search" onclick="searchSchedules()">搜尋</button>
  </div>

  <div id="countText" style="padding:8px 20px;color:var(--muted)"><span>共 0 筆資料</span></div>

  <div class="list" aria-live="polite">
    <div class="list-head">
      <div class="col-1">序號</div>
      <div class="col-2">群組名稱</div>
      <div class="col-3">演練主題</div>
      <div class="col-4">演練時間</div>
      <div class="col-5">演練震度</div>
      <div class="col-6">操作</div>
    </div>
    <div id="rowsContainer"><div class="empty">載入中...</div></div>
  </div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header" id="modalTitle">新增排程</div>
    <div class="modal-body">
      <div class="form-group">
        <label>主題</label>
        <input type="text" id="newTheme" placeholder="輸入主題">
      </div>
      <div class="form-group">
        <label>群組</label>
        <select id="newLocation"></select>
      </div>
      <div class="form-group">
        <label>震度</label>
        <select id="newMagnitude"></select>
      </div>
      <div class="form-group">
        <label>時間</label>
        <input type="datetime-local" id="newDate">
      </div>
    </div>
    <div class="modal-footer">
        <button class="btn-delete-modal" id="btnDeleteInModal" style="display:none;" onclick="handleDeleteFromModal()">刪除</button>
        <button class="btn-close" onclick="closeModal()">取消</button>
        <button class="btn-search" onclick="handleConfirmSave()">確認</button>
    </div>
  </div>
</div>

<div id="confirmLayer">
    <div class="confirm-card">
        <div class="confirm-title" id="confirmTitle">確認動作</div>
        <div class="confirm-desc" id="confirmDesc">你確定要執行這項操作嗎？</div>
        <div class="confirm-btns">
            <button class="btn-close" onclick="hideConfirm()">取消</button>
            <button id="confirmExecuteBtn" class="btn-confirm">確定</button>
        </div>
    </div>
</div>

<button id="topBtn" onclick="scrollToTop()">TOP</button>

<script>
const API_BASE = 'http://127.0.0.1:5009/api';
let allGroups = [];
let allSchedules = [];
let editingId = null;

window.onload = () => {
    populateMagnitudes();
    initData();
};

// --- 資料初始化 ---
async function initData() {
    try {
        const [gRes, sRes] = await Promise.all([
            fetch(`${API_BASE}/groups`),
            fetch(`${API_BASE}/schedules`)
        ]);
        allGroups = await gRes.json();
        allSchedules = await sRes.json();
        populateGroupOptions();
        render(allSchedules);
    } catch (e) {
        document.getElementById('rowsContainer').innerHTML = '<div class="empty">連線後端失敗</div>';
    }
}

function populateGroupOptions(){
    const locSelect = document.getElementById('newLocation');
    locSelect.innerHTML = '<option value="">- 選擇群組 -</option>';
    allGroups.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = g.name;
        locSelect.appendChild(opt);
    });
}

function populateMagnitudes(){
    const magSelect = document.getElementById('newMagnitude');
    const mags=['1級','2級','3級','4級','5弱','5強','6弱','6強','7級'];
    magSelect.innerHTML='<option value="">-</option>';
    mags.forEach(m=>{
        const opt=document.createElement('option');
        opt.value=m; opt.textContent=m;
        magSelect.appendChild(opt);
    });
}

function render(list){
    const container = document.getElementById('rowsContainer');
    container.innerHTML='';
    if(!list || list.length === 0){
        container.innerHTML = '<div class="empty">查無資料</div>';
        document.querySelector('#countText span').textContent = '共 0 筆資料';
        return;
    }
    document.querySelector('#countText span').textContent = `共 ${list.length} 筆資料`;
    list.forEach((s, idx) => {
        const row = document.createElement('div');
        row.className = 'list-row';
        row.innerHTML = `
            <div class="col-1">${idx + 1}</div>
            <div class="col-2">${s.group_name || '未知群組'}</div>
            <div class="col-3">${s.theme}</div>
            <div class="col-4">${s.time.replace('T', ' ')}</div>
            <div class="col-5">${s.magnitude}</div>
            <div class="col-6"><button class="icon-btn" onclick="editSchedule(${s.id})">編輯</button></div>
        `;
        container.appendChild(row);
    });
}

// --- 🔴 確認視窗邏輯 ---
function askUserConfirm(title, desc, callback, isDanger = false) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmDesc').textContent = desc;
    document.getElementById('confirmLayer').style.display = 'flex';
    const btn = document.getElementById('confirmExecuteBtn');
    btn.className = isDanger ? 'btn-danger-confirm' : 'btn-confirm';
    btn.onclick = () => { hideConfirm(); callback(); };
}

function hideConfirm() { document.getElementById('confirmLayer').style.display = 'none'; }
function showCustomAlert(title, desc) { askUserConfirm(title, desc, hideConfirm, false); }

// --- 儲存邏輯 ---
function handleConfirmSave() {
    const theme = document.getElementById('newTheme').value.trim();
    const group_id = document.getElementById('newLocation').value;
    const magnitude = document.getElementById('newMagnitude').value;
    const time = document.getElementById('newDate').value;

    if(!theme || !group_id || !magnitude || !time) return showCustomAlert("提示", "所有欄位均為必填");
    
    const action = editingId ? "修改" : "新增";
    askUserConfirm("儲存排程", `確定要 ${action} 此模擬地震排程嗎？`, executeSave, false);
}

async function executeSave() {
    const payload = {
        id: editingId,
        group_id: document.getElementById('newLocation').value,
        theme: document.getElementById('newTheme').value.trim(),
        magnitude: document.getElementById('newMagnitude').value,
        time: document.getElementById('newDate').value
    };

    try {
        const res = await fetch(`${API_BASE}/schedules`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (res.ok) {
            showCustomAlert("成功", "排程已儲存。");
            closeModal();
            initData();
        }
    } catch (e) {
        showCustomAlert("錯誤", "儲存失敗，請檢查網路。");
    }
}

// --- 刪除邏輯 (從 Modal 觸發) ---
function handleDeleteFromModal() {
    askUserConfirm("⚠️ 確定刪除？", `您確定要刪除這筆排程嗎？此操作不可還原。`, executeDelete, true);
}

async function executeDelete() {
    try {
        const res = await fetch(`${API_BASE}/schedules/${editingId}`, { method: 'DELETE' });
        if(res.ok) {
            showCustomAlert("已刪除", "該排程任務已移除。");
            closeModal();
            initData();
        }
    } catch (e) {
        showCustomAlert("錯誤", "刪除失敗。");
    }
}

// --- 彈窗開關邏輯 ---
function openAddModal(){
    editingId = null;
    document.getElementById('modalTitle').textContent = '新增排程';
    document.getElementById('btnDeleteInModal').style.display = 'none';
    document.getElementById('newTheme').value = '';
    document.getElementById('newLocation').value = '';
    document.getElementById('newMagnitude').value = '';
    document.getElementById('newDate').value = '';
    openModal();
}

function editSchedule(id){
    const s = allSchedules.find(x => x.id === id);
    if(!s) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = '編輯排程';
    document.getElementById('btnDeleteInModal').style.display = 'block';
    document.getElementById('newTheme').value = s.theme;
    document.getElementById('newLocation').value = s.group_id;
    document.getElementById('newMagnitude').value = s.magnitude;
    document.getElementById('newDate').value = s.time;
    openModal();
}

function openModal(){ document.getElementById('modalBackdrop').style.display='flex'; }
function closeModal(){ document.getElementById('modalBackdrop').style.display='none'; }

// --- 搜尋功能 ---
function searchSchedules(){
    const themeVal = document.getElementById('themeInput').value.trim().toLowerCase();
    const start = document.getElementById('startDate').value;
    const end = document.getElementById('endDate').value;
    
    let filtered = allSchedules.filter(s => {
        let matchTheme = themeVal === '' || s.theme.toLowerCase().includes(themeVal);
        let sDate = s.time.split('T')[0];
        let matchTime = (!start || sDate >= start) && (!end || sDate <= end);
        return matchTheme && matchTime;
    });
    render(filtered);
}

// --- 其他 UI 輔助 ---
function scrollToTop(){ window.scrollTo({top:0,behavior:'smooth'}); }
window.addEventListener('scroll',()=>{ document.getElementById('topBtn').style.display=(window.scrollY>120)?'flex':'none'; });

function updateEndMin(){
    const start = document.getElementById('startDate').value;
    if(start) document.getElementById('endDate').min = start;
}
function updateStartMax(){
    const end = document.getElementById('endDate').value;
    if(end) document.getElementById('startDate').max = end;
}
</script>
</body>
</html>
