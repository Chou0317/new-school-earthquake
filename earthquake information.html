<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>最新地震資訊</title>
<style>
/* --- CSS 樣式維持不變 --- */
:root{
  --bg:#6c6c6c;
  --card:#ffffff;
  --primary:#002b88;
  --muted:#6b7280;
  --shadow:0 4px 12px rgba(0,0,0,.08);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans TC','Microsoft JhengHei',sans-serif;
}
html,body{margin:0;background:var(--bg);}
body{display:flex;justify-content:center;padding:24px;}
.card{background:#fff;box-shadow:var(--shadow);width:100%;max-width:1300px;}
.header{padding:14px 20px;background:var(--primary);color:#fff;font-size:20px;font-weight:600;}
.main{display:grid;grid-template-columns:420px 1fr;gap:16px;padding:16px;}
.map{height:650px;background:#fff;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;color:var(--muted);border:1px solid #eee;}
.top-right{display:grid;grid-template-columns:120px 120px 1fr;gap:12px;height:180px;}
.intensity{background:#fff;box-shadow:var(--shadow);padding:10px;}
.intensity h4{margin:0 0 6px;font-size:14px;}
.intensity-list{display:flex;flex-direction:column;gap:4px;font-size:13px;}
.dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px;}
.magnitude{background:#fff;box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column;justify-content:center;}
.magnitude span{font-size:14px;color:#555;}
.magnitude strong{font-size:60px;font-weight:800;color:#ef4444;text-align:center;}
.info-stack{display:flex;flex-direction:column;gap:12px;height:100%;}
.info-box{background:#fff;box-shadow:var(--shadow);padding:12px 16px;flex:1;display:flex;flex-direction:column;justify-content:center;}
.info-box h5{margin:0 0 4px;font-size:16px;color:#555;}
.info-box p{margin:0;font-size:18px;font-weight:600;line-height:1.6;}
.area{background:#fff;box-shadow:var(--shadow);padding:12px;max-height:420px;overflow:auto;margin-top:64px;}
.area-title{font-weight:700;margin:18px 0 8px; color:var(--primary); border-bottom:1px solid #eee; padding-bottom:4px;}
.county summary{cursor:pointer;font-weight:600; padding:4px 0;}
.districts{display:flex;flex-wrap:wrap;gap:6px 14px;padding:8px 18px;font-size:14px; color:#444;}
@media(max-width:900px){
  .main{grid-template-columns:1fr;}
  .top-right{grid-template-columns:1fr; height:auto;}
  .area{width:100%; margin-top:20px;}
}
</style>
</head>
<body>

<div class="card">
  <div class="header">最新地震資訊</div>

  <div class="main">
    <div class="map">震央地圖（示意）</div>

    <div class="right">
      <div class="top-right">
        <div class="intensity">
          <h4>震度</h4>
          <div class="intensity-list">
            <div><span class="dot" style="background:#b61eeb"></span>7</div>
            <div><span class="dot" style="background:#9a4c86"></span>6強</div>
            <div><span class="dot" style="background:#9a4644"></span>6弱</div>
            <div><span class="dot" style="background:#c43c3c"></span>5強</div>
            <div><span class="dot" style="background:#fe5231"></span>5弱</div>
            <div><span class="dot" style="background:#fe842e"></span>4</div>
            <div><span class="dot" style="background:#fffe2f"></span>3</div>
            <div><span class="dot" style="background:#33ff34"></span>2</div>
            <div><span class="dot" style="background:#e0ffe0"></span>1</div>
          </div>
        </div>

        <div class="magnitude">
          <span>芮氏規模</span>
          <strong id="magnitude">--</strong>
        </div>

        <div class="info-stack">
          <div class="info-box">
            <h5>發生時刻</h5>
            <p id="earthquake-time">載入中...</p>
          </div>
          <div class="info-box">
            <h5>震央</h5>
            <p id="epicenter-info">載入中...</p>
          </div>
        </div>
      </div>

      <div class="area" id="area-container">
        <p style="padding:10px; color:#666;">正在讀取地震報告...</p>
      </div>

    </div>
  </div>
</div>

<script>
async function fetchEarthquakeData() {
    try {
        const response = await fetch('http://localhost:5003/api/latest_earthquake');
        if (!response.ok) {
            throw new Error('無法從伺服器取得資料');
        }
        const data = await response.json();

        // 1. 更新芮氏規模
        document.getElementById('magnitude').innerText = data.magnitude;

        // 2. 更新發生時刻
        const timeStr = data.send_time;

        const dateObj = new Date(timeStr);

        const formattedTime = `${dateObj.getFullYear()} 年 ${dateObj.getMonth() + 1} 月 ${dateObj.getDate()} 日　${dateObj.getHours()} 時 ${dateObj.getMinutes()} 分 ${dateObj.getSeconds()} 秒`;

        document.getElementById('earthquake-time').innerText = formattedTime;

        // 3. 更新震央資訊 (經緯度已經在後端處理過：數字多少顯多少，不補贅零)
        const epiHtml = `
            北緯 ${data.epicenter.lat} 度、東經 ${data.epicenter.lon} 度<br>
            震源深度：${data.epicenter.depth} 公里
        `;
        document.getElementById('epicenter-info').innerHTML = epiHtml;

        // 4. 更新影響縣市列表 (依序：北、中、南、東、外島)
        const areaContainer = document.getElementById('area-container');
        areaContainer.innerHTML = ''; 

        // 注意：data.reports 現在是一個 Array，順序已由後端固定
        if (data.reports && data.reports.length > 0) {
            data.reports.forEach(region => {
                
                // 建立區域名稱 (如：北部地區)
                const regionTitle = document.createElement('div');
                regionTitle.className = 'area-title';
                regionTitle.innerText = region.region_name;
                areaContainer.appendChild(regionTitle);

                // 遍歷該區域下的縣市
                region.counties.forEach(county => {
                    const details = document.createElement('details');
                    details.open = true;

                    // 摘要：縣市名稱 + 最大震度 + 「級」
                    const summary = document.createElement('summary');
                    summary.innerText = `${county.city} 最大震度 ${county.max_intensity} 級`;
                    details.appendChild(summary);

                    // 鄉鎮列表
                    const districtsDiv = document.createElement('div');
                    districtsDiv.className = 'districts';

                    county.towns.forEach(town => {
                        const span = document.createElement('span');
                        // 鄉鎮顯示：鄉鎮名 + 震度數字 + 「級」
                        span.innerText = `${town.name} ${town.intensity} 級`;
                        districtsDiv.appendChild(span);
                    });

                    details.appendChild(districtsDiv);
                    areaContainer.appendChild(details);
                });
            });
        } else {
            areaContainer.innerHTML = '<p style="padding:10px;">本次地震無顯著影響範圍資料。</p>';
        }

    } catch (error) {
        console.error('Error:', error);
        document.getElementById('area-container').innerText = '讀取資料失敗，請確認後端伺服器 (Port 5003) 是否正常運作。';
    }
}

document.addEventListener('DOMContentLoaded', fetchEarthquakeData);
</script>

</body>
</html>
