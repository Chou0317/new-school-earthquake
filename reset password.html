<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>即時地震監測系統 - 重設密碼</title>
<style>
  body { margin: 0; font-family: "Noto Sans TC", sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
  .reset-container { background-color: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,0.1); width: 360px; text-align: center; }
  .reset-container h1 { font-size: 20px; margin-bottom: 25px; color: #002b88; }
  .reset-container label { display: block; text-align: left; font-size: 14px; margin-bottom: 5px; color: #333; }
  .reset-container input { width: 100%; padding: 10px 12px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
  .reset-container button { width: 100%; padding: 10px; background-color: #002b88; color: white; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; }
  .reset-container button:hover { background-color: #0039b0; }
  .user-info { margin-bottom: 20px; padding: 10px; background-color: #eef2ff; border-radius: 6px; font-size: 14px; color: #002b88; font-weight: bold; }
</style>
</head>
<body>
  <div class="reset-container">
    <h1>重設您的密碼</h1>
    <div id="userInfo" class="user-info">載入中...</div>

    <label for="newPassword">新密碼 / New Password</label>
    <input type="password" id="newPassword" placeholder="請輸入新密碼">

    <label for="confirmPassword">確認新密碼 / Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="再次輸入新密碼">

    <button id="resetBtn">確認修改密碼</button>
  </div>

  <script>
    // 從網址解析參數: ?token=xxx&user=xxx
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const username = urlParams.get('user');

    if (!token || !username) {
      alert('無效的連結，請重新申請。');
      window.location.href = "login.html";
    }

    document.getElementById('userInfo').innerText = "帳號：" + username;

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || newPassword.length < 8) {
        alert('密碼長度至少需 8 碼');
        return;
      }

      if (newPassword !== confirmPassword) {
        alert('兩次密碼輸入不一致');
        return;
      }

      try {
        const response = await fetch('http://127.0.0.1:5001/api/reset_password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            username: username,
            token: token,
            newPassword: newPassword
          })
        });

        const result = await response.json();

        if (response.ok) {
          alert('密碼重設成功！請使用新密碼登入。');
          window.location.href = "login.html";
        } else {
          alert('重設失敗：' + (result.error || '連結可能已過期'));
        }
      } catch (error) {
        alert('伺服器連線失敗');
      }
    });
  </script>
</body>
</html>
